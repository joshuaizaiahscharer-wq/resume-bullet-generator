<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | BulletAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/auth.css" />
    <link rel="stylesheet" href="/admin-dashboard.css" />
  </head>
  <body class="admin-page-body">
    <nav class="nav nav--wide">
      <a href="/" class="nav-logo">&#10022; BulletAI</a>
      <div class="nav-actions">
        <a href="/" class="nav-link">Bullet Generator</a>
        <a href="/resume-template-builder" class="nav-link">Resume Template Builder</a>
        <a href="/blog" class="nav-link">Blog</a>
        <a href="/admin-dashboard" class="nav-link nav-link--active">Admin</a>
        <button id="navAuthBtn" class="nav-auth-btn" type="button" aria-label="Sign in to BulletAI">Sign In</button>
      </div>
    </nav>

    <main class="admin-main">
      <section class="admin-card" aria-labelledby="adminTitle">
        <div class="admin-header">
          <div>
            <p class="admin-eyebrow">User Access Overview</p>
            <h1 id="adminTitle">Admin Dashboard</h1>
            <p class="admin-subtitle">Monitor login activity and paywall unlock status in one place.</p>
          </div>
        </div>

        <div class="admin-controls" aria-label="Dashboard controls">
          <label class="control-search" for="userSearchInput">
            <span>Search</span>
            <input
              id="userSearchInput"
              type="search"
              placeholder="Search by user ID or email"
              autocomplete="off"
            />
          </label>

          <label class="control-select" for="paymentFilterSelect">
            <span>Filter</span>
            <select id="paymentFilterSelect">
              <option value="all">Show All</option>
              <option value="paid">Paid Only</option>
              <option value="free">Free Only</option>
            </select>
          </label>

          <label class="control-select" for="sortSelect">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="lastActive_desc">Last Active (Newest)</option>
              <option value="lastActive_asc">Last Active (Oldest)</option>
              <option value="payment_desc">Payment Status (Paid First)</option>
              <option value="payment_asc">Payment Status (Free First)</option>
            </select>
          </label>
        </div>

        <div class="admin-table-wrap" id="adminTableRoot" aria-live="polite"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="/auth.js"></script>
    <script type="module" src="/admin-dashboard.js"></script>
  </body>
</html>
