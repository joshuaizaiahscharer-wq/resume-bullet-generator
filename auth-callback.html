<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://www.myresumebullets.com/auth/callback" />
    <title>Completing Sign In...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: "Inter", "Segoe UI", sans-serif;
      }
      .card {
        max-width: 440px;
        border: 1px solid #1e293b;
        background: rgba(15, 23, 42, 0.8);
        border-radius: 12px;
        padding: 24px;
        text-align: center;
      }
      .sub {
        color: #94a3b8;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Completing sign in...</h1>
      <p class="sub">Please wait while we finish authenticating your account.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
      (async function () {
        const next = new URLSearchParams(window.location.search).get("next") || "/";

        try {
          const resp = await fetch("/api/public-auth-config");
          const cfg = await resp.json();
          if (!resp.ok || !cfg?.supabaseUrl || !(cfg?.supabasePublishableKey || cfg?.supabaseAnonKey)) {
            window.location.replace(next);
            return;
          }

          const key = cfg.supabasePublishableKey || cfg.supabaseAnonKey;
          const supabaseClient = window.supabase.createClient(cfg.supabaseUrl, key, {
            auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
          });

          const url = new URL(window.location.href);
          const code = url.searchParams.get("code");
          if (code) {
            const { data: sessionData } = await supabaseClient.auth.exchangeCodeForSession(code);
            const accessToken = sessionData?.session?.access_token;
            if (accessToken) {
              try {
                await fetch("/api/resume-builder/sync-payment", {
                  method: "POST",
                  credentials: "include",
                  headers: { "Authorization": `Bearer ${accessToken}` },
                });
              } catch (_) {}
            }
          }
        } catch (_err) {
          // fall through to redirect
        }

        window.location.replace(next);
      })();
    </script>
  </body>
</html>
